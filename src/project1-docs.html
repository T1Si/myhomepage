<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档中心 - 项目一</title>
  <link rel="stylesheet" href="style.css?v=4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="logo logo-with-icon" onclick="return false;" style="cursor: default;">
        <img src="assets/pics/xiangleme_icon_bright%201.png" alt="响了么" class="logo-icon"
          style="width: 32px; height: 32px; max-width: 32px; max-height: 32px; object-fit: contain; display: block;">
        <span>响了么</span>
      </a>
    </div>
  </nav>

  <section class="docs-page">
    <div class="docs-layout">
      <div class="docs-sidebar-frame" style="width: 380px;">
        <aside class="docs-sidebar">
          <nav class="docs-tree">
            <a href="#about" class="tree-item" data-doc="about">
              关于响了么
            </a>
            <a href="#guide" class="tree-item" data-doc="guide">
              使用指南
            </a>
            <a href="#privacy" class="tree-item" data-doc="privacy">
              隐私政策
            </a>
            <a href="#terms" class="tree-item" data-doc="terms">
              用户协议
            </a>
            <a href="#update-log" class="tree-item" data-doc="update-log">
              更新日志
            </a>
          </nav>
        </aside>
      </div>

      <main class="docs-main">
        <div class="docs-main-inner">
          <article id="doc-content" class="doc-view">
          </article>

          <aside class="doc-toc">
            <div class="toc-title">页面导航</div>
            <nav id="toc-nav" class="toc-nav">
              <!-- 动态生成 -->
            </nav>
          </aside>

          <div class="doc-footer-nav">
            <a href="#" class="footer-nav-btn prev" id="nav-prev">
              <span class="nav-btn-arrow">←</span>
              <div class="nav-btn-content">
                <span class="nav-btn-label">上一页</span>
                <span class="nav-btn-title" id="prev-title"></span>
              </div>
            </a>
            <a href="#" class="footer-nav-btn next" id="nav-next">
              <div class="nav-btn-content">
                <span class="nav-btn-label">下一页</span>
                <span class="nav-btn-title" id="next-title"></span>
              </div>
              <span class="nav-btn-arrow">→</span>
            </a>
          </div>
        </div>
      </main>
    </div>
  </section>

  <script src="common/docLoader.js"></script>
  <script>
    const docs = [
      { id: 'about', title: '关于响了么', file: 'assets/docs/about.md' },
      { id: 'guide', title: '使用指南', file: 'assets/docs/guide.md' },
      { id: 'privacy', title: '隐私政策', file: 'assets/docs/privacy.md' },
      { id: 'terms', title: '用户协议', file: 'assets/docs/terms.md' },
      { id: 'update-log', title: '更新日志', file: 'assets/docs/update-log.md' }
    ];

    let docContents = {};
    let currentIndex = 0;

    async function initDocs() {
      docContents = await DocLoader.loadAllDocs(docs);

      // 从 URL 哈希加载文档
      const hash = window.location.hash.slice(1); // 移除 # 号
      if (hash) {
        const index = docs.findIndex(d => d.id === hash);
        if (index !== -1) {
          loadDoc(index);
          return;
        }
      }

      // 默认加载第一个文档
      loadDoc(0);
    }

    function loadDoc(index) {
      currentIndex = index;
      const doc = docs[index];
      const content = docContents[doc.id];

      // 更新 URL 哈希（不触发页面跳转）
      history.replaceState(null, '', `#${doc.id}`);

      // 更新页面标题
      document.title = `${doc.title} - 项目一 - 我的作品集`;

      document.getElementById('doc-content').innerHTML = `<div class="doc-body">${content}</div>`;

      // 生成目录
      generateTOC();

      document.querySelectorAll('.tree-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.doc === doc.id) {
          item.classList.add('active');
        }
      });

      updateNavButtons(index);

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function generateTOC() {
      const docBody = document.querySelector('.doc-body');
      const headings = docBody.querySelectorAll('h2, h3');
      const tocNav = document.getElementById('toc-nav');

      if (headings.length === 0) {
        tocNav.innerHTML = '<div class="toc-empty">此文档无标题</div>';
        return;
      }

      let tocHTML = '';
      headings.forEach((heading, index) => {
        const id = `heading-${index}`;
        heading.id = id;

        const level = heading.tagName === 'H2' ? 'toc-h2' : 'toc-h3';
        const text = heading.textContent;

        tocHTML += `<a href="#${id}" class="toc-link ${level}" data-target="${id}">${text}</a>`;
      });

      tocNav.innerHTML = tocHTML;

      // 添加点击事件
      document.querySelectorAll('.toc-link').forEach(link => {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          const targetId = this.dataset.target;
          const targetElement = document.getElementById(targetId);
          if (targetElement) {
            const docsMain = document.querySelector('.docs-main');
            const offsetTop = targetElement.offsetTop - 20;
            docsMain.scrollTo({ top: offsetTop, behavior: 'smooth' });

            // 更新活动状态
            document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
            this.classList.add('active');
          }
        });
      });

      // 监听滚动，高亮当前章节
      observeHeadings();
    }

    function observeHeadings() {
      const docsMain = document.querySelector('.docs-main');
      const headings = document.querySelectorAll('.doc-body h2, .doc-body h3');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            document.querySelectorAll('.toc-link').forEach(link => {
              link.classList.remove('active');
              if (link.dataset.target === id) {
                link.classList.add('active');
              }
            });
          }
        });
      }, {
        root: docsMain,
        rootMargin: '-20% 0px -70% 0px',
        threshold: 0
      });

      headings.forEach(heading => observer.observe(heading));
    }

    function updateNavButtons(index) {
      const prevBtn = document.getElementById('nav-prev');
      const nextBtn = document.getElementById('nav-next');
      const prevTitle = document.getElementById('prev-title');
      const nextTitle = document.getElementById('next-title');

      if (index === 0) {
        prevBtn.style.visibility = 'hidden';
      } else {
        prevBtn.style.visibility = 'visible';
        prevBtn.href = `#${docs[index - 1].id}`;
        prevTitle.textContent = docs[index - 1].title;
      }

      if (index === docs.length - 1) {
        nextBtn.style.visibility = 'hidden';
      } else {
        nextBtn.style.visibility = 'visible';
        nextBtn.href = `#${docs[index + 1].id}`;
        nextTitle.textContent = docs[index + 1].title;
      }
    }

    // 点击侧边栏导航
    document.querySelectorAll('.tree-item').forEach(item => {
      item.addEventListener('click', function (e) {
        e.preventDefault();
        const docId = this.dataset.doc;
        const index = docs.findIndex(d => d.id === docId);
        if (index !== -1) {
          loadDoc(index);
        }
      });
    });

    // 点击上一页/下一页
    document.getElementById('nav-prev').addEventListener('click', function (e) {
      e.preventDefault();
      if (currentIndex > 0) {
        loadDoc(currentIndex - 1);
      }
    });

    document.getElementById('nav-next').addEventListener('click', function (e) {
      e.preventDefault();
      if (currentIndex < docs.length - 1) {
        loadDoc(currentIndex + 1);
      }
    });

    // 监听浏览器前进/后退按钮
    window.addEventListener('hashchange', function () {
      const hash = window.location.hash.slice(1);
      if (hash) {
        const index = docs.findIndex(d => d.id === hash);
        if (index !== -1 && index !== currentIndex) {
          loadDoc(index);
        }
      }
    });

    initDocs();
  </script>
  <!-- Version: 2026-03-01-v4 -->
</body>

</html>
