<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档中心 - 项目一</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Portfolio</a>
      <ul class="nav-menu">
        <li><a href="index.html#home">首页</a></li>
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#projects">作品</a></li>
        <li><a href="index.html#contact">联系</a></li>
      </ul>
    </div>
  </nav>

  <section class="docs-page">
    <div class="docs-layout">
      <div class="docs-sidebar-frame">
        <aside class="docs-sidebar">
        <a href="project1.html" class="back-link">← 返回项目</a>
        <div class="sidebar-title">📚 文档中心</div>
        <nav class="docs-tree">
          <a href="docs/about.html" class="tree-item" data-doc="about">
            关于响了么
          </a>
          <a href="docs/guide.html" class="tree-item" data-doc="guide">
            使用指南
          </a>
          <a href="docs/privacy.html" class="tree-item" data-doc="privacy">
            隐私政策
          </a>
          <a href="docs/terms.html" class="tree-item" data-doc="terms">
            用户协议
          </a>
          <a href="#" class="tree-item" data-doc="update-log">
            更新日志
          </a>
        </nav>
      </aside>
      </div>

      <main class="docs-main">
        <div class="docs-main-inner">
          <div id="docs-controls">
            <button id="btn-refresh-docs" class="btn btn-secondary">刷新文档</button>
            <span id="refresh-status"></span>
          </div>
          <article id="doc-content" class="doc-view">
          </article>

          <div class="doc-footer-nav">
            <a href="#" class="footer-nav-btn prev" id="nav-prev">
              <span class="nav-btn-arrow">←</span>
              <div class="nav-btn-content">
                <span class="nav-btn-label">上一页</span>
                <span class="nav-btn-title" id="prev-title"></span>
              </div>
            </a>
            <a href="#" class="footer-nav-btn next" id="nav-next">
              <div class="nav-btn-content">
                <span class="nav-btn-label">下一页</span>
                <span class="nav-btn-title" id="next-title"></span>
              </div>
              <span class="nav-btn-arrow">→</span>
            </a>
          </div>
        </div>
      </main>
    </div>
  </section>

  <script src="common/docLoader.js"></script>
      <script>
    const docs = [
      { id: 'about', title: '关于响了么', file: 'assets/docs/about.md' },
      { id: 'guide', title: '使用指南', file: 'assets/docs/guide.md' },
      { id: 'privacy', title: '隐私政策', file: 'assets/docs/privacy.md' },
      { id: 'terms', title: '用户协议', file: 'assets/docs/terms.md' },
      { id: 'update-log', title: '更新日志', file: 'assets/docs/update-log.md' }
    ];

    let docContents = {};
    let currentIndex = 0;

    async function initDocs() {
      docContents = await DocLoader.loadAllDocs(docs);
      loadDoc(0);
    }

    function loadDoc(index) {
      currentIndex = index;
      const doc = docs[index];
      const content = docContents[doc.id];
      
      document.getElementById('doc-content').innerHTML = `<div class="doc-body">${content}</div>`;
      
      document.querySelectorAll('.tree-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.doc === doc.id) {
          item.classList.add('active');
        }
      });

      updateNavButtons(index);
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateNavButtons(index) {
      const prevBtn = document.getElementById('nav-prev');
      const nextBtn = document.getElementById('nav-next');
      const prevTitle = document.getElementById('prev-title');
      const nextTitle = document.getElementById('next-title');

      if (index === 0) {
        prevBtn.style.visibility = 'hidden';
      } else {
        prevBtn.style.visibility = 'visible';
        prevBtn.href = docs[index - 1].file;
        prevTitle.textContent = docs[index - 1].title;
      }

      if (index === docs.length - 1) {
        nextBtn.style.visibility = 'hidden';
      } else {
        nextBtn.style.visibility = 'visible';
        nextBtn.href = docs[index + 1].file;
        nextTitle.textContent = docs[index + 1].title;
      }
    }

    document.querySelectorAll('.tree-item').forEach(item => {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        const docId = this.dataset.doc;
        const index = docs.findIndex(d => d.id === docId);
        loadDoc(index);
      });
    });

    document.getElementById('nav-prev').addEventListener('click', function(e) {
      e.preventDefault();
      if (currentIndex > 0) {
        loadDoc(currentIndex - 1);
      }
    });

    document.getElementById('nav-next').addEventListener('click', function(e) {
      e.preventDefault();
      if (currentIndex < docs.length - 1) {
        loadDoc(currentIndex + 1);
      }
    });

    initDocs();
  </script>
  <script>
    async function refreshDocs() {
      const status = document.getElementById('refresh-status');
      status.textContent = '正在刷新...';
      try {
        // Reload all docs to ensure latest content from MD files
        docContents = await DocLoader.loadAllDocs(docs);
        loadDoc(currentIndex);
        status.textContent = '已刷新';
        setTimeout(() => { status.textContent = ''; }, 1500);
      } catch (e) {
        status.textContent = '刷新失败';
        console.error(e);
        setTimeout(() => { status.textContent = ''; }, 1500);
      }
    }

    document.getElementById('btn-refresh-docs')?.addEventListener('click', refreshDocs);
  </script>
</body>
</html>
