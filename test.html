<!DOCTYPE html>
<html lang="en">
<style>
  .docs-main { height: 100vh; overflow-y: auto; overflow-x: hidden; background: #fff; }
  .docs-main-inner { display: flex; gap: 3rem; padding: 2rem; position: relative; }
  .doc-content-wrapper { display: block; max-width: 800px; min-width: 0; flex: 1; }
  .doc-view { height: 2000px; background: #eee; }
  .doc-toc { 
    position: sticky; top: 100px; width: 200px; flex-shrink: 0; 
    align-self: flex-start; background: transparent; padding: 0; 
    max-height: calc(100vh - 120px); overflow-y: auto; 
    z-index: 50; margin-left: auto; 
    border: 1px solid red; height: 300px;
  }
</style>
<body>
  <div class="docs-main">
    <div class="docs-main-inner">
      <div class="doc-content-wrapper">
        <div class="doc-view">LONG CONTENT</div>
      </div>
      <aside class="doc-toc">TOC STICKS?</aside>
    </div>
  </div>
</body>
</html>
